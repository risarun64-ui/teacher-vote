<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>先生投票システム（ポイント配分）</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>先生投票（累積投票）</h1>
        <p class="subtitle">合計10ポイントを自由に配分してください。</p>
        <p class="subtitle">好きな先生程ポイントを多く割り当てましょう。</p>
        <div class="points-status">
          <span class="label">持ち点:</span>
          <span class="total-points">10</span> pt
          <span class="label">残り:</span>
          <span id="remaining-points" class="remaining-points">10</span> pt
        </div>
      </header>

      <main id="vote-container"></main>

      <div id="status-message"></div>
      <div class="submit-container">
        <button
          id="submit-btn"
          class="submit-btn"
          onclick="submitVote()"
          disabled
        >
          投票する
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
